<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преподаватель — Учёт посещаемости</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabulator-tables/6.2.1/css/tabulator.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator-tables/6.2.1/js/tabulator.min.js"></script>
    <style>
        .t-tabs { display:flex; background:var(--surface); border-bottom:2px solid var(--border); padding:0 1.4rem; }
        .t-tab  { padding:.7rem 1.6rem; cursor:pointer; font-size:.95rem; font-weight:500; color:var(--muted);
                  border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .13s; }
        .t-tab:hover  { color:var(--text); }
        .t-tab.active { color:var(--primary); border-bottom-color:var(--primary); }

        .t-body { max-width:800px; margin:1.6rem auto; padding:0 1rem; }

        .lesson-box {
            background:#eff6ff; border:1.5px solid #bfdbfe;
            border-radius:var(--radius); padding:1rem 1.2rem; margin-bottom:1.2rem;
        }
        .lesson-box .lt { font-size:1.1rem; font-weight:700; color:var(--primary); }
        .lesson-box .lm { font-size:.85rem; color:var(--muted); margin-top:.25rem; }
        .lesson-none    { background:#fff7ed; border:1.5px solid #fed7aa; border-radius:var(--radius);
                          padding:.9rem 1.2rem; margin-bottom:1.2rem; color:#92400e; font-size:.92rem; }

        .cam-wrap { position:relative; background:#0f172a; border-radius:12px; overflow:hidden;
                    aspect-ratio:4/3; max-width:640px; margin:0 auto; box-shadow:var(--shadow); }
        .cam-wrap video { width:100%; height:100%; object-fit:cover; display:block; }
        .cam-ph { position:absolute; inset:0; display:flex; flex-direction:column;
                  align-items:center; justify-content:center; color:#fff; gap:.5rem; }

        .preview-strip { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.7rem; justify-content:center; }
        .pi { position:relative; }
        .pi img { width:90px; height:68px; object-fit:cover; border-radius:7px; border:2px solid var(--border); display:block; }
        .pi-del { position:absolute; top:-5px; right:-5px; width:18px; height:18px; border-radius:50%;
                  background:var(--danger); border:none; color:#fff; font-size:.62rem; cursor:pointer;
                  display:flex; align-items:center; justify-content:center; }

        /* Модальное окно — непрозрачное */
        .msg-overlay { position:fixed; inset:0; background:rgba(15,23,42,.78);
                       display:flex; align-items:center; justify-content:center; z-index:9999; }
        .msg-box { background:#fff; border-radius:16px; padding:2.2rem 2.8rem; text-align:center;
                   box-shadow:0 24px 80px rgba(0,0,0,.4); min-width:300px; max-width:420px; }
        .msg-box h3 { font-size:1.2rem; margin-bottom:.5rem; }
        .msg-box p  { color:var(--muted); font-size:.9rem; margin-bottom:1.4rem; line-height:1.55; }
        .msg-box .photos-count { font-size:2rem; font-weight:700; color:var(--primary); display:block; margin-bottom:.3rem; }

        /* Таблица журнала */
        .att-table { width:100%; border-collapse:collapse; font-size:.92rem; }
        .att-table thead th { background:#f8fafc; color:var(--muted); font-size:.78rem; font-weight:700;
                              text-transform:uppercase; padding:.6rem .9rem; text-align:left;
                              border-bottom:2px solid var(--border); }
        .att-table tbody td { padding:.55rem .9rem; border-bottom:1px solid var(--border); vertical-align:middle; }
        .att-table tbody tr:last-child td { border-bottom:none; }
        .att-table tbody tr.rp { background:#f0fdf4; }

        .sp { display:inline-block; padding:.2rem .6rem; border-radius:6px; font-size:.82rem; font-weight:600; }
        .sp-p { background:#dcfce7; color:#15803d; }
        .sp-a { background:#fee2e2; color:#b91c1c; }
        .sp-m { background:#fef9c3; color:#92400e; }
        .sp-u { background:#f1f5f9; color:#475569; }

        /* Блок добавления фото в модальном */
        .add-cam-wrap { position:relative; background:#0f172a; border-radius:9px; overflow:hidden;
                        aspect-ratio:4/3; margin-bottom:.7rem; }
        .add-cam-wrap video  { width:100%; height:100%; object-fit:cover; display:block; }
        .add-cam-wrap canvas { display:none; }
        .add-cam-ph { position:absolute; inset:0; display:flex; align-items:center;
                      justify-content:center; color:#fff; flex-direction:column; gap:.4rem; }
        .add-strip  { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.5rem; }
        .add-strip img { width:72px; height:54px; object-fit:cover; border-radius:6px; border:2px solid var(--border); }

        /* Индикатор обработки в Lists tab */
        .processing-badge {
            display:inline-flex; align-items:center; gap:.5rem;
            background:#dbeafe; color:#1d4ed8; padding:.3rem .8rem;
            border-radius:999px; font-size:.83rem; font-weight:600; margin-bottom:.8rem;
        }
        .mini-spin { width:14px; height:14px; border:2px solid #bfdbfe;
                     border-top-color:#1d4ed8; border-radius:50%;
                     animation:spin .7s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-title">Учёт посещаемости</span>
    <span class="text-sm" id="navName" style="opacity:.8;"></span>
    <button class="navbar-btn" onclick="logout()">Выйти</button>
</nav>

<div class="t-tabs">
    <div class="t-tab active" id="tab-shoot-btn" onclick="switchTab('shoot')">Съёмка</div>
    <div class="t-tab"        id="tab-lists-btn" onclick="switchTab('lists')">
        Списки <span id="listsCountBadge" style="display:none;" class="badge badge-primary"></span>
    </div>
</div>

<!--  ВКЛАДКА: Съёмка -->
<div id="tab-shoot">
    <div class="t-body">
        <div class="card">
            <div class="form-group mb-2">
                <label class="form-label" style="font-size:1rem;font-weight:700;">Выберите группу</label>
                <select id="groupSelect" class="form-control" style="max-width:360px;" onchange="onGroupChange()">
                    <option value="">— Выберите группу —</option>
                </select>
            </div>

            <div id="lessonArea"></div>

            <div id="camSection" class="hidden">
                <div class="cam-wrap">
                    <video id="videoEl" autoplay playsinline muted></video>
                    <div class="cam-ph" id="camPh"><p>Камера не активна</p></div>
                </div>

                <div class="preview-strip" id="previewStrip"></div>

                <div style="text-align:center;margin-top:.6rem;">
                    <span class="text-muted text-sm" id="photoCount">Снимков: 0</span>
                </div>

                <div style="display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-top:.8rem;">
                    <button class="btn btn-primary"        id="btnOn"    onclick="camOn()">Включить камеру</button>
                    <button class="btn btn-success  hidden" id="btnSnap"  onclick="snap()">Сделать снимок</button>
                    <button class="btn btn-outline  hidden" id="btnOff"   onclick="camOff()">Выключить</button>
                    <button class="btn btn-danger btn-sm"  id="btnClear" onclick="clearAll()" style="display:none;">Очистить</button>
                </div>

                <div style="text-align:center;margin-top:1rem;">
                    <button class="btn btn-primary btn-lg" id="btnSend" onclick="sendPhotos()" disabled>
                        Отправить фото
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ВКЛАДКА: Списки -->
<div id="tab-lists" class="hidden">
    <div class="t-body" style="max-width:1000px;">
        <div class="flex mb-2" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;">
            <h2 style="margin:0;">Журналы посещаемости</h2>
            <button class="btn btn-outline btn-sm" onclick="loadLists()">Обновить</button>
        </div>

        <!-- Показывается пока идёт обработка -->
        <div id="processingBadge" class="processing-badge hidden">
            <div class="mini-spin"></div>
            Идёт распознавание фотографий...
        </div>

        <div id="listsTable"></div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО: Фотографии отправлены -->
<div class="msg-overlay hidden" id="sentModal">
    <div class="msg-box">
        <h3>Фото отправлены</h3>

        <div style="display:flex;justify-content:center;margin:1.2rem 0;">
            <button class="btn btn-primary btn-lg"
                    style="min-width:180px;"
                    onclick="onSentOk()">
                OK
            </button>
        </div>
    </div>
</div>

<!--  ДЕТАЛЬНЫЙ ПРОСМОТР: список + камера (полный экран вместо модалки) -->
<div id="detail-view" class="hidden">
    <div class="t-body">
        <div class="card">

            <!-- Шапка с названием и кнопкой назад -->
            <div class="flex mb-2" style="justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;">
                <div>
                    <h2 id="dvTitle" style="margin-bottom:.2rem;">Журнал занятия</h2>
                    <p class="text-muted text-sm" id="dvSubTitle"></p>
                </div>
                <button class="btn btn-outline btn-sm" onclick="closeDetailView()">← Назад</button>
            </div>

            <!-- Камера для дополнительных снимков -->
            <h3 class="mb-1" style="font-size:1rem;">Дополнительная съёмка</h3>
            <div class="cam-wrap">
                <video id="dvVideoEl" autoplay playsinline muted></video>
                <div class="cam-ph" id="dvCamPh"><p>Камера не активна</p></div>
            </div>

            <div class="preview-strip" id="dvPreviewStrip"></div>

            <div style="text-align:center;margin-top:.6rem;">
                <span class="text-muted text-sm" id="dvPhotoCount">Снимков: 0</span>
            </div>

            <div style="display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-top:.8rem;">
                <button class="btn btn-primary"        id="dvBtnOn"    onclick="dvCamOn()">Включить камеру</button>
                <button class="btn btn-success  hidden" id="dvBtnSnap"  onclick="dvSnap()">Сделать снимок</button>
                <button class="btn btn-outline  hidden" id="dvBtnOff"   onclick="dvCamOff()">Выключить</button>
                <button class="btn btn-danger btn-sm"  id="dvBtnClear" onclick="dvClearAll()" style="display:none;">Очистить</button>
            </div>

            <div style="text-align:center;margin-top:1rem;">
                <button class="btn btn-primary btn-lg" id="dvBtnSend" onclick="dvSendPhotos()" disabled>
                    Отправить фото
                </button>
            </div>

            <!-- Списки студентов -->
            <div class="mt-3" style="border-top:1px solid var(--border);padding-top:1.2rem;display:grid;gap:1.2rem;">

                <div>
                    <h3 class="mb-1" style="font-size:.97rem;color:#15803d;">
                        Присутствуют — <span id="dvPresentCount">0</span>
                    </h3>
                    <div id="dvPresentList"></div>
                </div>

                <div>
                    <h3 class="mb-1" style="font-size:.97rem;color:#b91c1c;">
                        Отсутствуют — <span id="dvAbsentCount">0</span>
                    </h3>
                    <div id="dvAbsentList"></div>
                </div>

                <p class="text-muted text-sm">
                    Нераспознанных лиц (чужие): <strong id="dvUnrecCount">—</strong>
                </p>

            </div>
        </div>
    </div>
</div>

<script>
// Авторизация 
const TOKEN = localStorage.getItem('token');
if (!TOKEN) window.location.href = '/';
document.getElementById('navName').textContent = localStorage.getItem('fullname') || '';

function logout() { localStorage.clear(); window.location.href = '/'; }

async function api(url, opts) {
    if (!opts) opts = {};
    if (!opts.headers) opts.headers = {};
    opts.headers['Authorization'] = 'Bearer ' + TOKEN;
    const res  = await fetch(url, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    return data;
}

//  Вкладки 
function switchTab(name) {
    ['shoot','lists'].forEach(function(t) {
        document.getElementById('tab-'+t).classList.add('hidden');
        document.getElementById('tab-'+t+'-btn').classList.remove('active');
    });
    document.getElementById('tab-'+name).classList.remove('hidden');
    document.getElementById('tab-'+name+'-btn').classList.add('active');
    if (name === 'lists') loadLists();
}

//  Состояние 
let currentLesson  = null;
let stream         = null;
let photos         = [];

let pendingJobId       = null;
let pendingLessonId    = null;
let lastOpenedLessonId = null;
let pollTimer          = null;
let sentModalSource    = null;   // 'main' | 'additional'

// Состояние detail-view
let dvLessonId = null;
let dvStream   = null;
let dvPhotos   = [];

//  Выбор группы → автоопределение пары 
async function loadGroups() {
    try {
        const groups = await api('/api/groups');
        const sel    = document.getElementById('groupSelect');
        groups.forEach(function(g) {
            const o = document.createElement('option');
            o.value = g.id; o.textContent = g.name; sel.appendChild(o);
        });
    } catch (e) { console.error(e); }
}

/**
 * Вызывается при изменении выбора группы.
 * Запрашивает текущее занятие у сервера — сервер определяет пару
 * по дате и времени, преподавателю ничего не нужно выбирать вручную.
 */
async function onGroupChange() {
    currentLesson = null;
    document.getElementById('lessonArea').innerHTML = '';
    document.getElementById('camSection').classList.add('hidden');

    const gid = document.getElementById('groupSelect').value;
    if (!gid) return;

    try {
        const res  = await api('/api/lessons/current?group_id=' + gid);
        currentLesson = res.lesson;
        const area = document.getElementById('lessonArea');

        if (!currentLesson) {
            area.innerHTML = '<div class="lesson-none">На сегодня нет запланированных занятий.</div>';
            return;
        }

        area.innerHTML =
            '<div class="lesson-box">' +
            '<div class="lt">' + esc(currentLesson.subject_name||'—') +
            ' &mdash; Занятие ' + currentLesson.lesson_number + '</div>' +
            '<div class="lm">Группа: ' + esc(currentLesson.group_name||'—') +
            (currentLesson.time_start
                ? ' &nbsp;|&nbsp; ' + currentLesson.time_start + '&ndash;' + (currentLesson.time_end||'')
                : '') +
            (currentLesson.classroom
                ? ' &nbsp;|&nbsp; ауд. ' + esc(currentLesson.classroom) : '') +
            ' &nbsp;|&nbsp; ' + (currentLesson.lesson_date||'') + '</div>' +
            (currentLesson.topic ? '<div class="lm">Тема: ' + esc(currentLesson.topic) + '</div>' : '') +
            '</div>';

        document.getElementById('camSection').classList.remove('hidden');
    } catch (e) {
        document.getElementById('lessonArea').innerHTML =
            '<div class="lesson-none">Ошибка: ' + esc(e.message) + '</div>';
    }
}

//  Камера 
async function camOn() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: 'environment' }, /* задняя камера на телефоне */
                width:  { ideal: 1280 },
                height: { ideal: 720 },
            },
            audio: false,
        });
        document.getElementById('videoEl').srcObject = stream;
        document.getElementById('camPh').classList.add('hidden');
        show('btnSnap'); show('btnOff'); hide('btnOn');
    } catch (e) { alert('Нет доступа к камере: ' + e.message); }
}

function camOff() {
    if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
    document.getElementById('videoEl').srcObject = null;
    document.getElementById('camPh').classList.remove('hidden');
    show('btnOn'); hide('btnSnap'); hide('btnOff');
}

/** Захват кадра. Лимит не установлен. */
function snap() {
    const v = document.getElementById('videoEl');
    const c = document.createElement('canvas');
    c.width = v.videoWidth||1280; c.height = v.videoHeight||720;
    c.getContext('2d').drawImage(v,0,0);
    c.toBlob(function(blob) {
        photos.push(blob);
        updateSendBtn();
        const strip = document.getElementById('previewStrip');
        const idx   = photos.length - 1;
        const wrap  = document.createElement('div'); wrap.className = 'pi';
        const img   = document.createElement('img'); img.src = URL.createObjectURL(blob);
        const del   = document.createElement('button'); del.className = 'pi-del';
        del.textContent = 'x'; del.onclick = function(){removePhoto(idx);};
        wrap.appendChild(img); wrap.appendChild(del); strip.appendChild(wrap);
    }, 'image/jpeg', 0.92);
}

function removePhoto(idx) {
    photos.splice(idx, 1);
    const strip = document.getElementById('previewStrip');
    strip.innerHTML = '';
    photos.forEach(function(blob, i) {
        const wrap = document.createElement('div'); wrap.className = 'pi';
        const img  = document.createElement('img'); img.src = URL.createObjectURL(blob);
        const del  = document.createElement('button'); del.className = 'pi-del';
        del.textContent = 'x'; del.onclick = function(){removePhoto(i);};
        wrap.appendChild(img); wrap.appendChild(del); strip.appendChild(wrap);
    });
    updateSendBtn();
}

function clearAll() {
    photos = [];
    document.getElementById('previewStrip').innerHTML = '';
    updateSendBtn();
}

function updateSendBtn() {
    const n = photos.length;
    document.getElementById('photoCount').textContent = 'Снимков: ' + n;
    document.getElementById('btnSend').disabled       = n === 0 || !currentLesson;
    document.getElementById('btnClear').style.display = n > 0 ? '' : 'none';
}

// Отправка фото 

/**
 * Отправляет снимки на сервер и сразу показывает сообщение «Фотографии отправлены».
 *
 * Сервер возвращает job_id (HTTP 202) — распознавание идёт в фоне.
 * После нажатия OK пользователь переходит во вкладку Списки.
 * Polling каждые 3 сек определяет когда задача завершена,
 * сохраняет журнал и автоматически открывает результат.
 */
async function sendPhotos() {
        if (!currentLesson || photos.length === 0) return;

        const fd = new FormData();
        fd.append('lesson_id', currentLesson.id);

        photos.forEach(function(blob, i) {
            fd.append('photos', blob, 'photo_' + (i + 1) + '.jpg');
        });

        let jobId;

        try {
            const res = await fetch('/api/attendance/recognize', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + TOKEN
                },
                body: fd,
            });

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || res.statusText);
            }

            jobId = data.job_id;

        } catch (e) {
            alert('Ошибка отправки: ' + e.message);
            return;
        }

        pendingJobId = jobId;

        pendingLessonId = currentLesson.id;

        lastOpenedLessonId = currentLesson.id;

        document.getElementById('sentModal')
            .classList.remove('hidden');
    }

/**
 * Нажатие OK в модальном окне «Фотографии отправлены».
 * Закрывает окно, сбрасывает форму, переходит в Списки.
 * Polling запускается в фоне.
 */
function onSentOk() {
    document.getElementById('sentModal').classList.add('hidden');

    if (sentModalSource === 'additional') {
        sentModalSource = null;
        // Polling уже запущен в dvSendPhotos, lists уже показан — просто ждём.
        return;
    }

    // Главный поток: сбрасываем форму и переходим в Списки.
    sentModalSource = null;
    camOff();
    clearAll();
    currentLesson = null;
    document.getElementById('groupSelect').value = '';
    document.getElementById('lessonArea').innerHTML = '';
    document.getElementById('camSection').classList.add('hidden');
    switchTab('lists');
    startPolling();
}

// Polling 

/**
 * Запускает опрос сервера каждые 3 секунды.
 *
 * Когда задача завершена:
 *   1. Сохраняет журнал автоматически
 *   2. Обновляет таблицу списков
 *   3. Автоматически открывает журнал занятия
 *
 * Этот подход (polling) используется в веб-приложениях для операций,
 * которые занимают несколько секунд (распознавание лиц, конвертация файлов,
 * генерация отчётов). Альтернативы — WebSocket или Server-Sent Events —
 * требуют дополнительной инфраструктуры.
 */
function startPolling() {
    if (!pendingJobId) return;

    document.getElementById('processingBadge')
        .classList.remove('hidden');

    pollTimer = setInterval(async function() {

        if (!pendingJobId) {
            clearInterval(pollTimer);

            document.getElementById('processingBadge')
                .classList.add('hidden');

            return;
        }

        try {
            const job = await api(
                '/api/attendance/jobs/' + pendingJobId
            );

            if (job.status === 'done') {

                clearInterval(pollTimer);

                document.getElementById('processingBadge')
                    .classList.add('hidden');

                const result = job.result;

                const presentIds =
                    (result.recognized || [])
                    .map(function(s) {
                        return s.id;
                    });

                const jobLessonId = pendingLessonId;

                pendingJobId    = null;
                pendingLessonId = null;

                // Автосохранение журнала
                try {

                    await api('/api/attendance/submit', {
                        method: 'POST',
                        headers: {
                            'Content-Type':'application/json'
                        },
                        body: JSON.stringify({
                            lesson_id: jobLessonId,
                            present_ids: presentIds,
                            manual_ids: []
                        }),
                    });

                } catch (e) {

                    console.error(
                        'submit error:',
                        e.message
                    );
                }

                // Обновление таблицы
                await loadLists();

                if (listsTab) {

                    listsTab.replaceData(
                        await api('/api/attendance/summary')
                    );
                }

                // Автооткрытие готового списка
                openDetailView(jobLessonId);

            } else if (job.status === 'error') {

                clearInterval(pollTimer);

                document.getElementById('processingBadge')
                    .classList.add('hidden');

                pendingJobId = null;

                alert(
                    'Ошибка распознавания: ' +
                    (job.message || 'неизвестная ошибка')
                );
            }

        } catch (e) {

            // сетевые ошибки игнорируем
            console.warn(
                'Ошибка опроса:',
                e.message
            );
        }

    }, 3000);
}

//  Вкладка Списки 
let listsTab = null;

async function loadLists() {
    try {
        const lists = await api('/api/attendance/summary');

        // Читаем заблокированные занятия из localStorage
        const lockedIds = JSON.parse(localStorage.getItem('lockedLessons') || '[]');

        const cols = [
            {title:'Дата',       field:'lesson_date',   width:100, responsive:0},
            {title:'Группа',     field:'group_name',    width:110, responsive:2},
            {title:'Предмет',    field:'subject_name',  minWidth:100, widthGrow:2, responsive:0},
            {title:'N',          field:'lesson_number', width:45, responsive:4},
            {title:'Присут.',    field:'present_count', width:80, responsive:3,
             formatter:function(c){return '<span class="badge badge-success">'+c.getValue()+'</span>';}},
            {title:'Отсутств.',  field:'absent_count',  width:80, responsive:3,
             formatter:function(c){return '<span class="badge badge-muted">'+c.getValue()+'</span>';}},
            {title:'',           width:190, hozAlign:'center', headerSort:false,
             formatter:function(c){
                const id      = c.getRow().getData().id;
                const locked  = lockedIds.indexOf(id) !== -1;
                if (locked) {
                    return '<span class="badge badge-success" style="padding:.3rem .7rem;">&#128274; Сохранён</span>';
                }
                return '<button class="btn btn-outline btn-sm" onclick="openDetailView('+id+')">Открыть</button> ' +
                       '<button class="btn btn-primary btn-sm" onclick="confirmSave('+id+')">Сохранить</button>';
             }},
        ];

        if (listsTab) {
            listsTab.setData(lists);
            // Обновляем рендеринг после изменения lockedIds
            setTimeout(function(){ listsTab.redraw(true); }, 50);
            return;
        }

        // Русская локализация кнопок пагинации
        Tabulator.extendModule('localize', 'langs', {
            'ru-ru': {
                pagination: {
                    first:'Первая', first_title:'Первая страница',
                    last:'Последняя', last_title:'Последняя страница',
                    prev:'Пред.', prev_title:'Предыдущая страница',
                    next:'След.', next_title:'Следующая страница',
                    all:'Все',
                    counter:{ showing:'Показано', of:'из', rows:'записей', pages:'страниц' },
                },
            },
        });

        listsTab = new Tabulator('#listsTable', {
            data: lists, columns: cols, layout: 'fitColumns',
            pagination: true, paginationSize: 15,
            placeholder: 'Нет сохранённых журналов',
            initialSort:[{column:'lesson_date',dir:'desc'}],
            locale: 'ru',
            langs: {
                'ru': {
                    pagination: {
                        first: 'Первая', first_title: 'Первая страница',
                        last: 'Последняя', last_title: 'Последняя страница',
                        prev: 'Пред.', prev_title: 'Предыдущая страница',
                        next: 'След.', next_title: 'Следующая страница',
                        all: 'Все',
                        counter: { showing: 'Показано', of: 'из', rows: 'записей', pages: 'страниц' },
                    },
                },
            },
            resizableColumns: true,
            responsiveLayout: 'hide',
        });
    } catch (e) { console.error(e); }
}

/**
 * Подтверждение и блокировка журнала.
 * После сохранения учитель не может добавлять фото.
 */
function confirmSave(lessonId) {
    if (!confirm('Сохранить журнал занятия?\n\nПосле подтверждения изменения будут невозможны.\nНажмите OK для сохранения или Отмена для отказа.')) {
        return;
    }
    const lockedIds = JSON.parse(localStorage.getItem('lockedLessons') || '[]');
    if (lockedIds.indexOf(lessonId) === -1) {
        lockedIds.push(lessonId);
        localStorage.setItem('lockedLessons', JSON.stringify(lockedIds));
    }
    // Перезагружаем таблицу с обновлёнными данными
    listsTab = null;
    loadLists();
}

//  Детальный просмотр (полноэкранный) 

async function openDetailView(lessonId) {
    dvLessonId = lessonId;

    // Показываем экран, скрываем вкладки
    document.getElementById('tab-shoot').classList.add('hidden');
    document.getElementById('tab-lists').classList.add('hidden');
    document.getElementById('detail-view').classList.remove('hidden');

    // Сбрасываем камеру и снимки
    dvCamOff();
    dvPhotos = [];
    document.getElementById('dvPreviewStrip').innerHTML = '';
    dvUpdateSendBtn();

    // Если журнал заблокирован — скрываем секцию съёмки
    const lockedIds = JSON.parse(localStorage.getItem('lockedLessons') || '[]');
    const isLocked  = lockedIds.indexOf(lessonId) !== -1;
    const camBlock  = document.querySelector('#detail-view .cam-wrap');
    const camParent = camBlock ? camBlock.closest('h3, div') : null;
    // Прячем всю секцию камеры
    ['dvBtnOn','dvBtnSnap','dvBtnOff','dvBtnClear','dvBtnSend'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) el.style.display = isLocked ? 'none' : '';
    });
    if (document.getElementById('dvVideoEl'))
        document.getElementById('dvVideoEl').closest('.cam-wrap').style.display = isLocked ? 'none' : '';
    if (document.getElementById('dvPreviewStrip'))
        document.getElementById('dvPreviewStrip').style.display = isLocked ? 'none' : '';
    if (document.getElementById('dvPhotoCount'))
        document.getElementById('dvPhotoCount').style.display = isLocked ? 'none' : '';

    // Показываем/скрываем заголовок доп.съёмки
    const addHeader = document.querySelector('#detail-view h3');
    if (addHeader) addHeader.style.display = isLocked ? 'none' : '';

    document.getElementById('dvTitle').textContent    = 'Загрузка...';
    document.getElementById('dvSubTitle').textContent = '';
    document.getElementById('dvPresentList').innerHTML = '';
    document.getElementById('dvAbsentList').innerHTML  = '';

    try {
        const data    = await api('/api/attendance/lesson/' + lessonId);
        const lesson  = data.lesson  || {};
        const records = data.records || [];

        document.getElementById('dvTitle').textContent =
            (lesson.subject_name || '—') + ' — Занятие ' + (lesson.lesson_number || '');
        document.getElementById('dvSubTitle').textContent =
            'Группа: ' + (lesson.group_name || '—') +
            (lesson.lesson_date ? ' | ' + lesson.lesson_date : '') +
            (lesson.time_start  ? ' | ' + lesson.time_start + '–' + (lesson.time_end || '') : '');

        const present = records.filter(function(r){ return r.status !== 'absent'; });
        const absent  = records.filter(function(r){ return r.status === 'absent'; });

        document.getElementById('dvPresentCount').textContent = present.length;
        document.getElementById('dvAbsentCount').textContent  = absent.length;
        document.getElementById('dvUnrecCount').textContent   =
            data.unrecognized_count !== undefined ? data.unrecognized_count : '—';

        function renderStudentList(containerId, list, badgeClass) {
            const el = document.getElementById(containerId);
            if (list.length === 0) {
                el.innerHTML = '<span class="text-muted text-sm">—</span>';
                return;
            }
            el.innerHTML = list.map(function(r) {
                return '<span class="sp ' + badgeClass + '" style="margin:.2rem;">' +
                    esc(r.full_name || '—') + '</span>';
            }).join('');
        }

        renderStudentList('dvPresentList', present, 'sp-p');
        renderStudentList('dvAbsentList',  absent,  'sp-a');

    } catch (e) {
        document.getElementById('dvTitle').textContent = 'Ошибка загрузки: ' + e.message;
    }
}

function closeDetailView() {
    dvCamOff();
    dvPhotos = [];
    document.getElementById('dvPreviewStrip').innerHTML = '';
    dvUpdateSendBtn();
    document.getElementById('detail-view').classList.add('hidden');
    switchTab('lists');
}

//  Камера в detail-view 

async function dvCamOn() {
    try {
        dvStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: 'environment' }, /* задняя камера на телефоне */
                width:  { ideal: 1280 },
                height: { ideal: 720 },
            },
            audio: false,
        });
        document.getElementById('dvVideoEl').srcObject = dvStream;
        document.getElementById('dvCamPh').classList.add('hidden');
        show('dvBtnSnap'); show('dvBtnOff'); hide('dvBtnOn');
    } catch (e) { alert('Нет доступа к камере: ' + e.message); }
}

function dvCamOff() {
    if (dvStream) { dvStream.getTracks().forEach(function(t){t.stop();}); dvStream = null; }
    const v = document.getElementById('dvVideoEl');
    if (v) v.srcObject = null;
    document.getElementById('dvCamPh').classList.remove('hidden');
    show('dvBtnOn'); hide('dvBtnSnap'); hide('dvBtnOff');
}

function dvSnap() {
    const v = document.getElementById('dvVideoEl');
    const c = document.createElement('canvas');
    c.width = v.videoWidth || 1280; c.height = v.videoHeight || 720;
    c.getContext('2d').drawImage(v, 0, 0);
    c.toBlob(function(blob) {
        dvPhotos.push(blob);
        dvUpdateSendBtn();
        const strip = document.getElementById('dvPreviewStrip');
        const idx   = dvPhotos.length - 1;
        const wrap  = document.createElement('div'); wrap.className = 'pi';
        const img   = document.createElement('img'); img.src = URL.createObjectURL(blob);
        const del   = document.createElement('button'); del.className = 'pi-del';
        del.textContent = 'x';
        del.onclick = function() { dvRemovePhoto(idx); };
        wrap.appendChild(img); wrap.appendChild(del); strip.appendChild(wrap);
    }, 'image/jpeg', 0.92);
}

function dvRemovePhoto(idx) {
    dvPhotos.splice(idx, 1);
    const strip = document.getElementById('dvPreviewStrip');
    strip.innerHTML = '';
    dvPhotos.forEach(function(blob, i) {
        const wrap = document.createElement('div'); wrap.className = 'pi';
        const img  = document.createElement('img'); img.src = URL.createObjectURL(blob);
        const del  = document.createElement('button'); del.className = 'pi-del';
        del.textContent = 'x'; del.onclick = function(){ dvRemovePhoto(i); };
        wrap.appendChild(img); wrap.appendChild(del); strip.appendChild(wrap);
    });
    dvUpdateSendBtn();
}

function dvClearAll() {
    dvPhotos = [];
    document.getElementById('dvPreviewStrip').innerHTML = '';
    dvUpdateSendBtn();
}

function dvUpdateSendBtn() {
    const n = dvPhotos.length;
    document.getElementById('dvPhotoCount').textContent   = 'Снимков: ' + n;
    document.getElementById('dvBtnSend').disabled          = n === 0;
    document.getElementById('dvBtnClear').style.display    = n > 0 ? '' : 'none';
}

async function dvSendPhotos() {
    if (!dvLessonId || dvPhotos.length === 0) return;

    const btn = document.getElementById('dvBtnSend');
    btn.disabled = true;

    const fd = new FormData();
    fd.append('lesson_id', dvLessonId);
    dvPhotos.forEach(function(blob, i) {
        fd.append('photos', blob, 'add_' + (i + 1) + '.jpg');
    });

    try {
        const res = await fetch('/api/attendance/recognize', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + TOKEN },
            body: fd,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);

        pendingJobId    = data.job_id;
        pendingLessonId = dvLessonId;

        dvCamOff();
        dvPhotos = [];
        document.getElementById('dvPreviewStrip').innerHTML = '';
        dvUpdateSendBtn();

        closeDetailView();          // уходим в Списки

        sentModalSource = 'additional';
        document.getElementById('sentModal').classList.remove('hidden');

        startPolling();             // polling → когда готово → openDetailView снова

    } catch (e) {
        alert('Ошибка отправки: ' + e.message);
    } finally {
        btn.disabled = false;
    }
}
//  Утилиты 
function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

//  Инициализация 
loadGroups();
</script>
