<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Учёт посещаемости</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-wrap">
    <div class="login-card">

        <div class="login-logo">
            <h2>Учёт посещаемости студентов</h2>
            <p>Система автоматического распознавания лиц</p>
        </div>

        <!-- Alert shown on authentication errors -->
        <div id="loginAlert" class="alert alert-error hidden"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="inputUsername">Логин</label>
                <input id="inputUsername"
                       class="form-control"
                       type="text"
                       autocomplete="username"
                       placeholder="Введите логин"
                       required>
            </div>

            <div class="form-group">
                <label class="form-label" for="inputPassword">Пароль</label>
                <input id="inputPassword"
                       class="form-control"
                       type="password"
                       autocomplete="current-password"
                       placeholder="Введите пароль"
                       required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
                Войти
            </button>
        </form>

        <p class="text-muted text-sm mt-2" style="text-align: center; line-height: 1.9;">
            admin / admin &mdash; администратор<br>
            teacher / teacher &mdash; преподаватель
        </p>

    </div>
</div>

<script>
    /*
     * index.html — login page script.
     *
     * On page load: redirect authenticated users to their panel.
     * On form submit: send credentials to the API, store the token,
     * and redirect to the appropriate panel based on the user role.
     */

    // Redirect already-authenticated users so they do not see the login form
    const existingToken = localStorage.getItem('token');
    const existingRole  = localStorage.getItem('role');
    if (existingToken) {
        window.location.href = existingRole === 'admin' ? '/admin.html' : '/teacher.html';
    }

    /**
     * Handle the login form submission.
     *
     * Sends the credentials to POST /api/auth/login.
     * On success, stores the JWT token and user info in localStorage
     * and redirects to the appropriate panel.
     * On failure, displays the error message returned by the server.
     *
     * @param {Event} event - the form submit event
     */
    document.getElementById('loginForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const submitBtn  = document.getElementById('submitBtn');
        const alertBox   = document.getElementById('loginAlert');
        const username   = document.getElementById('inputUsername').value.trim();
        const password   = document.getElementById('inputPassword').value;

        // Disable the button while the request is in progress
        submitBtn.disabled    = true;
        submitBtn.textContent = 'Выполняется вход...';
        alertBox.classList.add('hidden');

        try {
            const response = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ username: username, password: password }),
            });

            const data = await response.json();

            if (!response.ok) {
                alertBox.textContent = data.error || 'Ошибка входа в систему';
                alertBox.classList.remove('hidden');
                return;
            }

            // Store authentication data for subsequent page requests
            localStorage.setItem('token',    data.access_token);
            localStorage.setItem('role',     data.user.role);
            localStorage.setItem('username', data.user.username);
            localStorage.setItem('fullname', data.user.full_name || data.user.username);

            // Redirect based on role
            if (data.user.role === 'admin') {
                window.location.href = '/admin.html';
            } else {
                window.location.href = '/teacher.html';
            }

        } catch (networkError) {
            // Shown when the server is unreachable
            alertBox.textContent = 'Сервер недоступен. Убедитесь что приложение запущено.';
            alertBox.classList.remove('hidden');

        } finally {
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Войти';
        }
    });
</script>

</body>
</html>
